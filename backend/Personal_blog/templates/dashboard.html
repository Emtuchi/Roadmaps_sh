<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="container">
    <h1>Dashboard</h1>

    <a href="/add">
        <button>Add Article</button>
    </a>

    {% for article in articles %}
        <div class="card">
            <h3>{{ article.title }}</h3>

            <a href="/edit/{{ article.id }}">Edit</a> |
            <a href="/delete/{{ article.id }}">Delete</a>
        </div>
    {% endfor %}
</div>
